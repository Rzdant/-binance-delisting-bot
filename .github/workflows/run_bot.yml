name: Binance Delisting Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Open Web Extraction Pipeline
        run: |
          # Pulling public logs natively from the unblocked developer stream
          curl -s -L -A "Mozilla/5.0" "https://t.me/s/binance_api_announcements" | python bot.py
