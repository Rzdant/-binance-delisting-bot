name: Binance Delisting Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # Automatically executes every 5 minutes, 24/7/365
  workflow_dispatch:        # Keeps manual manual trigger button open

jobs:
  check-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Direct Browser Emulation Extraction
        run: |
          # Pull raw text from the official Binance announcement preview feed
          # and immediately pipe it right into your Python parser script
          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
          "https://t.me" | python bot.py
