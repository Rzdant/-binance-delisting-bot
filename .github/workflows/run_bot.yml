name: Binance Delisting Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes automatically
  workflow_dispatch:        # Manual run option enabled

jobs:
  check-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Monitor Script
        run: python bot.py
